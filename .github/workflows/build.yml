name: Build DNS Profile

on:
  workflow_dispatch:
    inputs:
      json:
        description: '粘贴 AdGuard JSON'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Save Input JSON
        run: |
          cat > input.json << 'EOF'
          ${{ github.event.inputs.json }}
          EOF

      - name: Generate
        run: python scripts/generate.py

      - name: Commit Files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "Auto update DNS profile" || echo "No changes"

          git push